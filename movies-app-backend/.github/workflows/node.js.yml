name: Node.js CI - MoviesApp-FullStack-Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgres://user:pass@localhost:5432/test_db
      NODE_ENV: test

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './movies-app-backend/package-lock.json'

    - name: Install dependencies
      run: npm install
      working-directory: ./movies-app-backend

    - name: Run Tests
      run: npm test
      working-directory: ./movies-app-backend
