name: Node.js CI - Movies App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # PASO CLAVE: Levantamos una DB temporal en GitHub
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user_test
          POSTGRES_PASSWORD: password_test
          POSTGRES_DB: movies_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './movies-app-backend/package-lock.json'

    - name: Install dependencies
      run: npm install
      working-directory: ./movies-app-backend

    # Creamos el .env temporal con las credenciales del servicio de arriba
    - name: Create temporary .env file
      run: |
        echo "DATABASE_URL=postgres://user_test:password_test@localhost:5432/movies_db_test" > .env
        echo "PORT=8080" >> .env
        echo "NODE_ENV=test" >> .env
      working-directory: ./movies-app-backend

    - name: Run tests
      # Agregamos --runInBand para que los tests corran uno por uno y no choquen en la DB
      run: npm test -- --runInBand
      working-directory: ./movies-app-backend
